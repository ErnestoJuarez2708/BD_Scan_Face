version: '3.7'

services: 

  postgres: 
    image: postgres:15
    restart: always
    environment: 
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=prisma
    ports: 
      - "5432:5432"
    networks: 
      - prisma-network 
    volumes: 
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql://postgres:prisma@postgres:5432/postgres
    networks:
      - prisma-network

networks: 
  prisma-network: 

volumes: 
  postgres_data: