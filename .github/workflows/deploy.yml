name: 🚀 Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repo
        uses: actions/checkout@v3

      - name: 🔐 Crear clave SSH
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem

      - name: ⏳ Esperar EC2
        run: sleep 20

      - name: 🧹 Limpiar servidor
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            rm -rf backend frontend dist
          EOF

      - name: 📤 Copiar backend
        run: |
          scp -o StrictHostKeyChecking=no -i key.pem -r backend ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/

      - name: 📤 Copiar frontend
        run: |
          scp -o StrictHostKeyChecking=no -i key.pem -r frontend ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/

      - name: ⚙️ Setup backend + Docker + Buildx
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

            set -e

            # 🐳 Instalar Docker
            if ! command -v docker &> /dev/null; then
              sudo yum update -y
              sudo amazon-linux-extras install docker -y
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ec2-user
            fi

            # 🔌 Instalar Docker Compose como PLUGIN (no binario separado)
            DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
            mkdir -p $DOCKER_CONFIG/cli-plugins
            curl -SL https://github.com/docker/compose/releases/download/v2.24.6/docker-compose-linux-x86_64 \
              -o $DOCKER_CONFIG/cli-plugins/docker-compose
            chmod +x $DOCKER_CONFIG/cli-plugins/docker-compose

            # 🚀 Instalar Buildx como PLUGIN
            mkdir -p $HOME/.docker/cli-plugins
            curl -SL https://github.com/docker/buildx/releases/download/v0.19.3/buildx-v0.19.3.linux-amd64 \
              -o $HOME/.docker/cli-plugins/docker-buildx
            chmod +x $HOME/.docker/cli-plugins/docker-buildx

            # Also install both plugins for root (needed if docker daemon requires root)
            sudo mkdir -p /root/.docker/cli-plugins
            sudo curl -SL https://github.com/docker/compose/releases/download/v2.24.6/docker-compose-linux-x86_64 \
              -o /root/.docker/cli-plugins/docker-compose
            sudo chmod +x /root/.docker/cli-plugins/docker-compose
            sudo curl -SL https://github.com/docker/buildx/releases/download/v0.19.3/buildx-v0.19.3.linux-amd64 \
              -o /root/.docker/cli-plugins/docker-buildx
            sudo chmod +x /root/.docker/cli-plugins/docker-buildx

            docker buildx create --use --name mybuilder || docker buildx use mybuilder
            docker buildx inspect --bootstrap

            cd /home/ec2-user/backend
            echo "${{ secrets.BACKEND_ENV }}" > .env

            # ✅ Usar "docker compose" (plugin) en vez de "docker-compose" (binario)
            docker compose down || true
            docker compose up -d --build

          EOF

      - name: 🌐 Build frontend (local en runner)
        run: |
          cd frontend
          echo "${{ secrets.FRONTEND_ENV }}" > .env
          npm install
          npm run build

      - name: 📤 Subir build frontend
        run: |
          scp -o StrictHostKeyChecking=no -i key.pem -r frontend/dist ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/dist

      - name: 🌍 Deploy frontend con nginx
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

            set -e

            # 🌐 Instalar nginx
            if ! command -v nginx &> /dev/null; then
              sudo amazon-linux-extras install nginx1 -y
            fi

            sudo systemctl start nginx
            sudo systemctl enable nginx

            # 🧹 Limpiar html
            sudo rm -rf /usr/share/nginx/html/*

            # 📦 Copiar build
            sudo cp -r /home/ec2-user/dist/* /usr/share/nginx/html/

          EOF