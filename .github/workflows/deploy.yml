name: 🚀 Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repo
        uses: actions/checkout@v3

      - name: 🔐 Crear archivo de clave SSH
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem

      - name: ⏳ Esperar EC2 (por si recién se creó)
        run: sleep 20

      - name: 🧹 Limpiar servidor
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            rm -rf backend frontend
          EOF

      - name: 📤 Copiar backend
        run: |
          scp -o StrictHostKeyChecking=no -i key.pem -r backend ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/

      - name: 📤 Copiar frontend
        run: |
          scp -o StrictHostKeyChecking=no -i key.pem -r frontend ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/

      - name: ⚙️ Configurar backend + Docker
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

            # Instalar Docker si no existe
            if ! command -v docker &> /dev/null; then
              sudo yum update -y
              sudo amazon-linux-extras install docker -y
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ec2-user
            fi

            # Instalar Docker Compose V1 standalone si no existe
            if ! command -v docker-compose &> /dev/null; then
              sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.6/docker-compose-$(uname -s)-$(uname -m)" \
                -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi

            cd /home/ec2-user/backend

            echo "${{ secrets.BACKEND_ENV }}" > .env

            # Usar sudo + ruta absoluta para evitar problemas de PATH
            sudo /usr/local/bin/docker-compose down
            sudo /usr/local/bin/docker-compose up -d --build

          EOF

      - name: 🌐 Build + Deploy frontend
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

            set -e  # Detener si cualquier comando falla

            cd /home/ec2-user/frontend

            echo "${{ secrets.FRONTEND_ENV }}" > .env

            # Instalar Node via nvm si no existe
            if ! command -v npm &> /dev/null; then
              curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
              export NVM_DIR="$HOME/.nvm"
              source "$NVM_DIR/nvm.sh"
              nvm install 20
              nvm use 20
            else
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
            fi

            npm install
            npm run build

            # Instalar nginx con amazon-linux-extras
            if ! command -v nginx &> /dev/null; then
              sudo amazon-linux-extras install nginx1 -y
            fi

            sudo systemctl start nginx
            sudo systemctl enable nginx

            sudo rm -rf /usr/share/nginx/html/*
            sudo cp -r dist/* /usr/share/nginx/html/

          EOF